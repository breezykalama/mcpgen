name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest

  examples:
    name: Smoke Example Gallery
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev dependencies
        run: python -m pip install -e ".[dev]"

      - name: Smoke JSONPlaceholder
        run: mcpgen smoke --from examples/jsonplaceholder.openapi.yaml --config examples/jsonplaceholder/mcpgen.yaml --cases examples/jsonplaceholder/routing_eval.yaml

      - name: Smoke GitHub-like API
        run: mcpgen smoke --from examples/github-like/openapi.yaml --config examples/github-like/mcpgen.yaml --cases examples/github-like/routing_eval.yaml

      - name: Smoke Billing API
        run: mcpgen smoke --from examples/billing-api/openapi.yaml --config examples/billing-api/mcpgen.yaml --cases examples/billing-api/routing_eval.yaml
