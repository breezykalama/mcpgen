openapi: 3.0.0
info:
  title: Billing API
  version: 1.0.0
servers:
  - url: https://billing.example.com
paths:
  /customers:
    get:
      operationId: listCustomers
      summary: List customers
      responses:
        "200":
          description: Customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      summary: Create customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomer"
  /invoices:
    get:
      operationId: listInvoices
      summary: List invoices
      parameters:
        - name: customerId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"
    post:
      operationId: createInvoice
      summary: Create invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoice"
  /invoices/{invoiceId}:
    delete:
      operationId: deleteInvoice
      summary: Delete invoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
components:
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
    Invoice:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [draft, open, paid]
    CreateCustomer:
      type: object
      required:
        - email
      properties:
        email:
          type: string
        name:
          type: string
    CreateInvoice:
      type: object
      required:
        - customerId
        - amount
      properties:
        customerId:
          type: string
        amount:
          type: number
