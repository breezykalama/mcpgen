openapi: 3.0.0
info:
  title: GitHub-like Repository API
  version: 1.0.0
servers:
  - url: https://api.github.example
paths:
  /repos/{owner}/{repo}/issues:
    get:
      operationId: listIssues
      summary: List repository issues
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed, all]
      responses:
        "200":
          description: Issues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Issue"
    post:
      operationId: createIssue
      summary: Create repository issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIssue"
  /repos/{owner}/{repo}/pulls:
    get:
      operationId: listPullRequests
      summary: List pull requests
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pull requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PullRequest"
  /repos/{owner}/{repo}/issues/{issue_number}:
    delete:
      operationId: deleteIssue
      summary: Delete issue
      parameters:
        - name: owner
          in: path
          required: true
          schema:
            type: string
        - name: repo
          in: path
          required: true
          schema:
            type: string
        - name: issue_number
          in: path
          required: true
          schema:
            type: integer
components:
  schemas:
    Issue:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        state:
          type: string
    PullRequest:
      type: object
      properties:
        number:
          type: integer
        title:
          type: string
        merged:
          type: boolean
    CreateIssue:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        body:
          type: string
